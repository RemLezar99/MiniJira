services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-jira-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mini_jira
      POSTGRES_PASSWORD: mini_jira_password
      POSTGRES_DB: mini_jira
    ports:
      - "5432:5432"
    volumes:
      - mini_jira_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_jira -d mini_jira"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mini_jira_postgres_data: